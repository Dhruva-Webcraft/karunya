<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyNexus — Student Resource Hub</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --bg2: #ffffff;
      --bg3: #f1f5f9;
      --surface: rgba(15,23,42,0.06);
      --surface2: rgba(15,23,42,0.10);
      --border: rgba(15,23,42,0.12);
      --border2: rgba(15,23,42,0.18);
      --indigo: #6366f1;
      --indigo2: #4f46e5;
      --violet: #7c3aed;
      --amber: #f59e0b;
      --emerald: #10b981;
      --rose: #ef4444;
      --sky: #38bdf8;
      --text: #0f172a;
      --text2: #475569;
      --text3: #64748b;
      --glow: 0 0 40px rgba(99,102,241,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }

    /* ---- SCROLLBAR ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    /* ---- BG MESH ---- */
    .mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 20% -10%, rgba(99,102,241,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 80% 110%, rgba(124,58,237,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 60% 50%, rgba(16,185,129,0.03) 0%, transparent 70%);
    }
    .noise {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    #root { position: relative; z-index: 1; }

    /* ---- NAV ---- */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .nav-logo { font-family:'Syne',sans-serif; font-size:1.25rem; font-weight:800; letter-spacing:-0.02em; }
    .nav-logo span { color: var(--indigo2); }
    .nav-tabs { display:flex; gap:0.25rem; }
    .nav-tab {
      padding: 0.4rem 0.9rem; border-radius: 8px; font-size:0.875rem; font-weight:500;
      cursor:pointer; border:none; background:transparent; color:var(--text2);
      transition: all 0.2s; font-family:'DM Sans',sans-serif;
    }
    .nav-tab:hover { color:var(--text); background:var(--surface2); }
    .nav-tab.active { color:var(--indigo2); background:rgba(99,102,241,0.12); }
    .nav-badge {
      background: linear-gradient(135deg,var(--indigo),var(--violet));
      color:white; font-size:0.7rem; font-weight:700; padding:0.2rem 0.6rem;
      border-radius:99px; letter-spacing:0.05em;
    }

    /* ---- GLASS CARD ---- */
    .glass {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .glass:hover { border-color: var(--border2); box-shadow: var(--glow); }
    .glass-lift:hover { transform: translateY(-3px); }

    /* ---- SECTION ---- */
    .section { padding: 3rem 2rem; max-width: 1280px; margin: 0 auto; }
    .section-header { margin-bottom: 2rem; }
    .section-label {
      font-size:0.75rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
      color: var(--indigo2); margin-bottom:0.5rem;
      display:flex; align-items:center; gap:0.5rem;
    }
    .section-label::before { content:''; width:20px; height:2px; background:var(--indigo2); border-radius:99px; }
    .section-title { font-size:2rem; font-weight:800; letter-spacing:-0.03em; line-height:1.2; }
    .section-sub { color:var(--text2); margin-top:0.5rem; font-size:0.95rem; }

    /* ---- HERO ---- */
    .hero {
      padding: 5rem 2rem 4rem;
      max-width: 1280px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
    }
    @media(max-width:768px){ .hero { grid-template-columns:1fr; } }
    .hero-eyebrow {
      display:inline-flex; align-items:center; gap:0.5rem;
      background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.25);
      padding:0.3rem 0.8rem; border-radius:99px; font-size:0.8rem; font-weight:600;
      color:var(--indigo2); margin-bottom:1.5rem;
    }
    .hero-title {
      font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight:800;
      letter-spacing:-0.04em; line-height:1.1; margin-bottom:1.25rem;
    }
    .hero-title .gradient {
      background: linear-gradient(135deg, var(--indigo2) 0%, #a78bfa 50%, var(--sky) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip:text;
    }
    .hero-desc { color:var(--text2); font-size:1.05rem; line-height:1.7; margin-bottom:2rem; }
    .hero-btns { display:flex; gap:0.75rem; flex-wrap:wrap; }
    .btn-primary {
      background: linear-gradient(135deg, var(--indigo) 0%, var(--violet) 100%);
      color:white; border:none; padding:0.7rem 1.5rem; border-radius:10px;
      font-weight:600; font-size:0.9rem; cursor:pointer; font-family:'DM Sans',sans-serif;
      transition: opacity 0.2s, transform 0.2s; display:flex; align-items:center; gap:0.5rem;
    }
    .btn-primary:hover { opacity:0.9; transform:translateY(-1px); }
    .btn-outline {
      background:transparent; color:var(--text); border:1px solid var(--border2);
      padding:0.7rem 1.5rem; border-radius:10px; font-weight:600; font-size:0.9rem;
      cursor:pointer; font-family:'DM Sans',sans-serif;
      transition: background 0.2s, transform 0.2s; display:flex; align-items:center; gap:0.5rem;
    }
    .btn-outline:hover { background:var(--surface2); transform:translateY(-1px); }

    /* ---- STATS ---- */
    .hero-stats { display:flex; gap:2rem; margin-top:2.5rem; flex-wrap:wrap; }
    .stat { }
    .stat-num { font-family:'Syne',sans-serif; font-size:1.75rem; font-weight:800; color:var(--indigo2); }
    .stat-label { font-size:0.8rem; color:var(--text3); margin-top:0.1rem; }

    /* ---- RESOURCE CARDS ---- */
    .resources-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.25rem; }
    .resource-card {
      padding:1.5rem; border-radius:16px;
      background:var(--surface); border:1px solid var(--border);
      transition: all 0.25s; cursor:pointer; position:relative; overflow:hidden;
    }
    .resource-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg, var(--indigo), var(--violet));
      opacity:0; transition:opacity 0.25s;
    }
    .resource-card:hover { border-color:var(--border2); transform:translateY(-3px); box-shadow:var(--glow); }
    .resource-card:hover::before { opacity:1; }
    .resource-icon {
      width:44px; height:44px; border-radius:12px;
      display:flex; align-items:center; justify-content:center; margin-bottom:1rem;
      font-size:1.25rem;
    }
    .resource-type {
      font-size:0.7rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
      padding:0.2rem 0.6rem; border-radius:99px; display:inline-block; margin-bottom:0.75rem;
    }
    .type-pdf { background:rgba(244,63,94,0.12); color:var(--rose); border:1px solid rgba(244,63,94,0.2); }
    .type-note { background:rgba(99,102,241,0.12); color:var(--indigo2); border:1px solid rgba(99,102,241,0.2); }
    .type-journal { background:rgba(16,185,129,0.12); color:var(--emerald); border:1px solid rgba(16,185,129,0.2); }
    .resource-title { font-size:1rem; font-weight:700; margin-bottom:0.4rem; letter-spacing:-0.01em; }
    .resource-meta { font-size:0.8rem; color:var(--text3); display:flex; gap:1rem; align-items:center; }

    /* ---- CHIPS ---- */
    .chips { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .chip {
      padding:0.35rem 0.85rem; border-radius:99px; font-size:0.8rem; font-weight:600;
      border: 1px solid var(--border); background:var(--surface); color:var(--text2);
      cursor:pointer; transition:all 0.15s;
    }
    .chip:hover, .chip.active { background:rgba(99,102,241,0.12); border-color:rgba(99,102,241,0.35); color:var(--indigo2); }

    /* ---- SEARCH ---- */
    .search-wrap { position:relative; margin-bottom:1.5rem; }
    .search-input {
      width:100%; padding:0.75rem 1rem 0.75rem 2.75rem;
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      color:var(--text); font-size:0.9rem; font-family:'DM Sans',sans-serif;
      outline:none; transition:border-color 0.2s;
    }
    .search-input:focus { border-color:rgba(99,102,241,0.5); }
    .search-icon { position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }

    /* ---- BENTO TOOLS ---- */
    .bento { display:grid; grid-template-columns:repeat(4,1fr); gap:1.25rem; }
    .bento-1 { grid-column:span 2; grid-row:span 2; }
    .bento-2 { grid-column:span 2; }
    .bento-3 { grid-column:span 1; }
    .bento-4 { grid-column:span 1; }
    .bento-5 { grid-column:span 2; }
    @media(max-width:900px){
      .bento { grid-template-columns:1fr 1fr; }
      .bento-1 { grid-column:span 2; }
      .bento-2 { grid-column:span 2; }
    }
    @media(max-width:600px){
      .bento { grid-template-columns:1fr; }
      .bento-1,.bento-2,.bento-3,.bento-4,.bento-5 { grid-column:span 1; grid-row:span 1; }
    }

    .tool-card {
      padding:1.75rem; border-radius:20px;
      background:var(--surface); border:1px solid var(--border);
      cursor:pointer; transition:all 0.25s; position:relative; overflow:hidden;
      min-height:180px; display:flex; flex-direction:column;
    }
    .tool-card:hover { border-color:var(--border2); box-shadow:var(--glow); transform:translateY(-2px); }
    .tool-glow {
      position:absolute; width:200px; height:200px; border-radius:50%;
      filter:blur(60px); opacity:0.12; pointer-events:none;
    }
    .tool-name { font-size:1.1rem; font-weight:700; margin-bottom:0.4rem; letter-spacing:-0.01em; }
    .tool-desc { font-size:0.85rem; color:var(--text2); line-height:1.6; flex:1; }
    .tool-arrow {
      margin-top:1rem; width:32px; height:32px; border-radius:8px;
      background:var(--surface2); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s;
    }
    .tool-card:hover .tool-arrow { background:rgba(99,102,241,0.15); border-color:rgba(99,102,241,0.3); }

    /* ---- GPA CALCULATOR ---- */
    .gpa-display {
      text-align:center; padding:2rem;
      background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(124,58,237,0.1));
      border:1px solid rgba(99,102,241,0.2); border-radius:20px; margin-bottom:1.5rem;
    }
    .gpa-number { font-family:'Syne',sans-serif; font-size:4rem; font-weight:800; letter-spacing:-0.05em; }
    .gpa-label { color:var(--text2); font-size:0.9rem; margin-top:0.25rem; }
    .gpa-bar { height:6px; border-radius:99px; background:var(--border); margin-top:1rem; overflow:hidden; }
    .gpa-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--indigo),var(--violet)); transition:width 0.5s ease; }
    .gpa-table { width:100%; border-collapse:collapse; }
    .gpa-table th { text-align:left; font-size:0.75rem; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.05em; padding:0.5rem 0.75rem; border-bottom:1px solid var(--border); }
    .gpa-table td { padding:0.5rem 0.25rem; border-bottom:1px solid var(--border); }
    .gpa-input {
      background:var(--surface2); border:1px solid var(--border); color:var(--text);
      padding:0.4rem 0.6rem; border-radius:8px; font-family:'DM Sans',sans-serif;
      font-size:0.875rem; width:100%; outline:none; transition:border-color 0.2s;
    }
    .gpa-input:focus { border-color:rgba(99,102,241,0.5); }
    .gpa-select {
      background:var(--surface2); border:1px solid var(--border); color:var(--text);
      padding:0.4rem 0.6rem; border-radius:8px; font-family:'DM Sans',sans-serif;
      font-size:0.875rem; width:100%; outline:none; cursor:pointer;
    }
    .btn-add {
      display:flex; align-items:center; gap:0.4rem;
      background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.2); color:var(--indigo2);
      padding:0.5rem 1rem; border-radius:8px; font-size:0.85rem; font-weight:600;
      cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s;
    }
    .btn-add:hover { background:rgba(99,102,241,0.2); }
    .btn-del {
      background:transparent; border:none; color:var(--text3); cursor:pointer;
      padding:0.25rem; border-radius:6px; transition:all 0.2s; display:flex; align-items:center;
    }
    .btn-del:hover { color:var(--rose); background:rgba(244,63,94,0.1); }

    /* ---- TIMETABLE ---- */
    .tt-grid { display:grid; grid-template-columns:60px repeat(5,1fr); gap:2px; }
    .tt-header { padding:0.5rem 0.25rem; text-align:center; font-size:0.75rem; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.05em; }
    .tt-time { padding:0.5rem 0.25rem; text-align:right; font-size:0.7rem; color:var(--text3); padding-right:0.75rem; }
    .tt-cell {
      min-height:52px; border-radius:8px; padding:0.35rem; cursor:pointer;
      border:1px dashed var(--border); background:var(--surface); transition:all 0.15s;
      font-size:0.72rem; position:relative;
    }
    .tt-cell:hover { border-color:rgba(99,102,241,0.4); background:rgba(99,102,241,0.06); }
    .tt-cell.filled { border-style:solid; }
    .tt-cell-name { font-weight:700; font-size:0.72rem; line-height:1.2; }
    .tt-cell-room { font-size:0.65rem; color:var(--text3); margin-top:0.1rem; }

    /* ---- POMODORO ---- */
    .pomo-ring {
      position:relative; width:180px; height:180px; margin:0 auto 1.5rem;
    }
    .pomo-ring svg { transform:rotate(-90deg); }
    .pomo-time {
      position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
    }
    .pomo-num { font-family:'Syne',sans-serif; font-size:2.5rem; font-weight:800; letter-spacing:-0.05em; }
    .pomo-phase { font-size:0.75rem; color:var(--text2); margin-top:0.2rem; text-transform:uppercase; letter-spacing:0.08em; }
    .pomo-btns { display:flex; gap:0.75rem; justify-content:center; }
    .pomo-btn {
      width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:1rem; border:none; transition:all 0.2s;
    }
    .pomo-btn-main { background:linear-gradient(135deg,var(--indigo),var(--violet)); color:white; }
    .pomo-btn-main:hover { opacity:0.85; transform:scale(1.05); }
    .pomo-btn-sec { background:var(--surface2); border:1px solid var(--border); color:var(--text2); }
    .pomo-btn-sec:hover { background:var(--surface); color:var(--text); }
    .pomo-phases { display:flex; gap:0.5rem; justify-content:center; margin-bottom:1.25rem; }
    .pomo-phase-btn {
      padding:0.3rem 0.75rem; border-radius:99px; font-size:0.75rem; font-weight:600;
      cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text2);
      font-family:'DM Sans',sans-serif; transition:all 0.15s;
    }
    .pomo-phase-btn.active { background:rgba(99,102,241,0.12); border-color:rgba(99,102,241,0.3); color:var(--indigo2); }

    /* ---- NOTES ---- */
    .notes-toolbar {
      display:flex; gap:0.5rem; padding:0.6rem; border:1px solid var(--border); border-bottom:none;
      border-radius:12px 12px 0 0; background:var(--surface); flex-wrap:wrap;
    }
    .notes-btn {
      padding:0.25rem 0.6rem; border-radius:6px; font-size:0.8rem; font-weight:600;
      cursor:pointer; border:1px solid transparent; background:transparent; color:var(--text2);
      font-family:'DM Sans',sans-serif; transition:all 0.15s;
    }
    .notes-btn:hover { background:var(--surface2); color:var(--text); }
    .notes-area {
      width:100%; min-height:220px; padding:1rem;
      background:var(--surface); border:1px solid var(--border);
      border-radius:0 0 12px 12px; color:var(--text);
      font-family:'DM Sans',sans-serif; font-size:0.9rem; line-height:1.7;
      outline:none; resize:vertical; transition:border-color 0.2s;
    }
    .notes-area:focus { border-color:rgba(99,102,241,0.4); }
    .notes-preview {
      min-height:220px; padding:1rem;
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; font-size:0.9rem; line-height:1.7;
    }
    .notes-preview h1 { font-size:1.5rem; margin-bottom:0.5rem; }
    .notes-preview h2 { font-size:1.2rem; margin-bottom:0.5rem; }
    .notes-preview h3 { font-size:1rem; margin-bottom:0.4rem; }
    .notes-preview p { margin-bottom:0.75rem; color:var(--text2); }
    .notes-preview strong { color:var(--text); }
    .notes-preview em { color:var(--text2); font-style:italic; }
    .notes-preview code { background:var(--surface2); padding:0.1rem 0.4rem; border-radius:4px; font-family:monospace; font-size:0.85em; color:var(--indigo2); }
    .notes-preview ul { padding-left:1.25rem; color:var(--text2); }
    .notes-preview li { margin-bottom:0.25rem; }

    /* ---- REQUEST FORM ---- */
    .form-group { margin-bottom:1.25rem; }
    .form-label { display:block; font-size:0.8rem; font-weight:700; color:var(--text2); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.05em; }
    .form-input, .form-select, .form-textarea {
      width:100%; background:var(--surface); border:1px solid var(--border);
      color:var(--text); padding:0.75rem 1rem; border-radius:10px;
      font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color:rgba(99,102,241,0.5); box-shadow:0 0 0 3px rgba(99,102,241,0.1);
    }
    .form-textarea { min-height:120px; resize:vertical; }
    .form-select option { background:var(--bg3); }
    .form-error { font-size:0.78rem; color:var(--rose); margin-top:0.3rem; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:600px){ .form-grid { grid-template-columns:1fr; } }

    /* ---- SUCCESS ---- */
    .success-overlay {
      position:fixed; inset:0; z-index:1000;
      background:rgba(8,12,20,0.9); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
    }
    .success-card {
      background:var(--bg2); border:1px solid rgba(16,185,129,0.3);
      border-radius:24px; padding:3rem; text-align:center; max-width:420px; width:90%;
      position:relative; overflow:hidden;
    }
    .success-icon {
      width:72px; height:72px; border-radius:50%;
      background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.3);
      display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem;
      font-size:2rem;
    }
    .confetti-piece {
      position:absolute; width:8px; height:8px; border-radius:2px;
      animation: confetti-fall 2.5s ease-in forwards;
    }
    @keyframes confetti-fall {
      0% { transform:translateY(-20px) rotate(0deg); opacity:1; }
      100% { transform:translateY(400px) rotate(720deg); opacity:0; }
    }

    /* ---- MODAL ---- */
    .modal-overlay {
      position:fixed; inset:0; z-index:200;
      background:rgba(8,12,20,0.8); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; padding:1rem;
    }
    .modal {
      background:var(--bg2); border:1px solid var(--border2); border-radius:24px;
      width:100%; max-height:92vh; overflow-y:auto;
      padding:2rem; position:relative;
    }
    .modal-close {
      position:absolute; top:1rem; right:1rem;
      width:36px; height:36px; border-radius:50%;

      cursor:pointer; display:flex; align-items:center; justify-content:center;
      color:var(--text2); transition:all 0.2s;
    }

    .modal-sub { color:var(--text2); font-size:0.875rem; margin-bottom:1.75rem; }
    .modal-lg { max-width:860px; }
    .modal-md { max-width:600px; }

    /* ---- TABS ---- */
    .tabs { display:flex; gap:0.25rem; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:0.25rem; margin-bottom:1.5rem; }
    .tab-btn {
      flex:1; padding:0.5rem; border-radius:8px; font-size:0.85rem; font-weight:600;

      transition:all 0.2s; font-family:'DM Sans',sans-serif;
    }
    .tab-btn.active { background:rgba(99,102,241,0.15); color:var(--indigo2); }

    /* ---- ANIMATIONS ---- */
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .animate-in { animation: fadeIn 0.4s ease forwards; }
    .skeleton {
      background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
      background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ---- PILL BADGE ---- */
    .badge {

      padding:0.2rem 0.6rem; border-radius:99px; font-size:0.7rem; font-weight:700;
    }
    .badge-green { background:rgba(16,185,129,0.1); color:var(--emerald); border:1px solid rgba(16,185,129,0.2); }
    .badge-amber { background:rgba(245,158,11,0.1); color:var(--amber); border:1px solid rgba(245,158,11,0.2); }
    .badge-blue { background:rgba(56,189,248,0.1); color:var(--sky); border:1px solid rgba(56,189,248,0.2); }

    /* ---- FOOTER ---- */
    .footer { border-top:1px solid var(--border); padding:2rem; text-align:center; color:var(--text3); font-size:0.85rem; }

    /* ---- MISC ---- */
    .divider { height:1px; background:var(--border); margin:1.5rem 0; }
    .tag { display:inline-block; padding:0.15rem 0.5rem; border-radius:6px; font-size:0.72rem; font-weight:600; margin-right:0.35rem; }
    .tag-indigo { background:rgba(99,102,241,0.1); color:var(--indigo2); }
    .tag-green { background:rgba(16,185,129,0.1); color:var(--emerald); }

    .progress-wrap { margin-bottom:0.5rem; }

    .progress-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--indigo),var(--violet)); transition:width 0.6s ease; }

    input::placeholder, textarea::placeholder { color:var(--text3); }
    select { cursor:pointer; }
  </style>
</head>

// ========================
// GPA CALCULATOR
// ========================
function GPACalculator() {
  const [rows, setRows] = useState(() => {
    try { return JSON.parse(localStorage.getItem('gpa_rows'))||[{id:1,subject:'',credits:'3',grade:'A'}]; }
    catch{ return [{id:1,subject:'',credits:'3',grade:'A'}]; }
  });

  useEffect(()=>{ localStorage.setItem('gpa_rows',JSON.stringify(rows)); },[rows]);

  const addRow = () => setRows(r=>[...r,{id:Date.now(),subject:'',credits:'3',grade:'B+'}]);
  const removeRow = (id) => setRows(r=>r.filter(x=>x.id!==id));
  const update = (id,field,val) => setRows(r=>r.map(x=>x.id===id?{...x,[field]:val}:x));

  const gpa = (() => {
    let pts=0,cr=0;
    rows.forEach(r=>{
      const c=parseFloat(r.credits)||0;
      const g=GRADE_POINTS[r.grade]??0;
      pts+=c*g; cr+=c;
    });
    return cr>0?(pts/cr).toFixed(2):0;
  })();

  const gpaColor = gpa>=3.5?'var(--emerald)':gpa>=2.5?'var(--amber)':'var(--rose)';
  const gpaLabel = gpa>=3.7?'Summa Cum Laude':gpa>=3.5?'Magna Cum Laude':gpa>=3.0?'Cum Laude':gpa>=2.0?'Satisfactory':'Needs Improvement';

  return (
    <div>
      <div className="gpa-display">
        <div className="gpa-number" style={{color:gpaColor}}>{gpa}</div>
        <div className="gpa-label">{gpaLabel}</div>
        <div className="gpa-bar"><div className="gpa-fill" style={{width:`${(gpa/4)*100}%`,background:`linear-gradient(90deg,${gpaColor},${gpaColor}aa)`}}/></div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.72rem',color:'var(--text3)',marginTop:'0.35rem'}}>
          <span>0.0</span><span>2.0</span><span>3.0</span><span>4.0</span>
        </div>
      </div>
      <div style={{overflowX:'auto'}}>
        <table className="gpa-table">
          <thead>
            <tr>
              <th>Subject</th>
              <th>Credits</th>
              <th>Grade</th>
              <th>Points</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {rows.map(r=>(
              <tr key={r.id}>
                <td><input className="gpa-input" placeholder="Subject name" value={r.subject} onChange={e=>update(r.id,'subject',e.target.value)}/></td>
                <td><input className="gpa-input" style={{width:'64px'}} type="number" min="1" max="6" value={r.credits} onChange={e=>update(r.id,'credits',e.target.value)}/></td>
                <td>
                  <select className="gpa-select" value={r.grade} onChange={e=>update(r.id,'grade',e.target.value)}>
                    {Object.keys(GRADE_POINTS).map(g=><option key={g} value={g}>{g}</option>)}
                  </select>
                </td>
                <td style={{color:'var(--indigo2)',fontWeight:600,fontSize:'0.85rem'}}>
                  {((parseFloat(r.credits)||0)*(GRADE_POINTS[r.grade]??0)).toFixed(1)}
                </td>
                <td>
                  <button className="btn-del" onClick={()=>removeRow(r.id)} title="Remove row">
                    <Icons.X/>
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{marginTop:'1rem'}}>
        <button className="btn-add" onClick={addRow}><Icons.Plus/> Add Subject</button>
      </div>
    </div>
  );
}

// ========================
// TIMETABLE PLANNER
// ========================
function TimetablePlanner() {
  const defaultSchedule = {};
  DAYS.forEach(d=>TIMES.forEach(t=>{ defaultSchedule[`${d}-${t}`]=null; }));

  const [schedule, setSchedule] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('tt_schedule'))||defaultSchedule; }
    catch{ return defaultSchedule; }
  });
  const [editing, setEditing] = useState(null);
  const [formVal, setFormVal] = useState({name:'',room:'',color:COLORS[0]});

  useEffect(()=>{ localStorage.setItem('tt_schedule',JSON.stringify(schedule)); },[schedule]);

  const openCell = (key) => {
    const cur = schedule[key];
    setFormVal(cur||{name:'',room:'',color:COLORS[0]});
    setEditing(key);
  };
  const saveCell = () => {
    if(!formVal.name.trim()){ setEditing(null); return; }
    setSchedule(s=>({...s,[editing]:formVal}));
    setEditing(null);
  };
  const clearCell = (key,e) => { e.stopPropagation(); setSchedule(s=>({...s,[key]:null})); };

  return (
    <div>
      <div style={{overflowX:'auto'}}>
        <div className="tt-grid" style={{minWidth:'600px'}}>
          <div className="tt-header"></div>
          {DAYS.map(d=><div key={d} className="tt-header">{d}</div>)}
          {TIMES.map(t=>(
            <React.Fragment key={t}>
              <div className="tt-time">{t}</div>
              {DAYS.map(d=>{
                const key=`${d}-${t}`;
                const cell=schedule[key];
                return (
                  <div key={key} className={`tt-cell${cell?' filled':''}`}
                    style={cell?{background:`${cell.color}14`,borderColor:`${cell.color}44`}:{}}
                    onClick={()=>openCell(key)}>
                    {cell&&(
                      <>
                        <div className="tt-cell-name" style={{color:cell.color}}>{cell.name}</div>
                        {cell.room&&<div className="tt-cell-room">{cell.room}</div>}
                        <button className="btn-del" style={{position:'absolute',top:2,right:2,padding:'1px',width:16,height:16,fontSize:'10px'}} onClick={e=>clearCell(key,e)}><Icons.X/></button>
                      </>
                    )}
                    {!cell&&<div style={{color:'var(--text3)',fontSize:'0.65rem',opacity:0.5}}>+</div>}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      </div>

      {editing&&(
        <div className="modal-overlay" onClick={()=>setEditing(null)}>
          <div className="modal modal-md" onClick={e=>e.stopPropagation()}>
            <button className="modal-close" onClick={()=>setEditing(null)}><Icons.X/></button>
            <div className="modal-title">Add Class</div>
            <div className="modal-sub">{editing.replace('-',' at ')}</div>
            <div className="form-group">
              <label className="form-label">Class Name</label>
              <input className="form-input" placeholder="e.g. Computer Science 301" value={formVal.name} onChange={e=>setFormVal(f=>({...f,name:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Room / Location</label>
              <input className="form-input" placeholder="e.g. Room B204" value={formVal.room} onChange={e=>setFormVal(f=>({...f,room:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Color</label>
              <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>
                {COLORS.map(c=>(
                  <div key={c} onClick={()=>setFormVal(f=>({...f,color:c}))} style={{
                    width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                    border:`3px solid ${formVal.color===c?'white':'transparent'}`,transition:'all 0.15s'
                  }}/>
                ))}
              </div>
            </div>
            <div style={{display:'flex',gap:'0.75rem',justifyContent:'flex-end',marginTop:'1rem'}}>
              <button className="btn-outline" onClick={()=>setEditing(null)}>Cancel</button>
              <button className="btn-primary" onClick={saveCell}><Icons.Check/> Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ========================
// POMODORO TIMER
// ========================
function PomodoroTimer() {
  const PHASES = [
    {label:'Focus',min:25,color:'var(--indigo)'},
    {label:'Short Break',min:5,color:'var(--emerald)'},
    {label:'Long Break',min:15,color:'var(--sky)'},
  ];
  const [phaseIdx,setPhaseIdx] = useState(0);
  const [secs,setSecs] = useState(PHASES[0].min*60);
  const [running,setRunning] = useState(false);
  const [sessions,setSessions] = useState(0);
  const ref = useRef();

  const total = PHASES[phaseIdx].min*60;
  const progress = (1-secs/total)*100;

  useEffect(()=>{
    if(running){
      ref.current=setInterval(()=>{
        setSecs(s=>{
          if(s<=1){ clearInterval(ref.current); setRunning(false); setSessions(n=>n+1); return 0; }
          return s-1;
        });
      },1000);
    } else clearInterval(ref.current);
    return ()=>clearInterval(ref.current);
  },[running]);

  const switchPhase=(i)=>{ setPhaseIdx(i); setSecs(PHASES[i].min*60); setRunning(false); };
  const reset=()=>{ setSecs(PHASES[phaseIdx].min*60); setRunning(false); };
  const mm=String(Math.floor(secs/60)).padStart(2,'0');
  const ss=String(secs%60).padStart(2,'0');
  const r=80; const circ=2*Math.PI*r;

  return (
    <div style={{padding:'1rem'}}>
      <div className="pomo-phases">
        {PHASES.map((p,i)=>(
          <button key={p.label} className={`pomo-phase-btn${phaseIdx===i?' active':''}`} onClick={()=>switchPhase(i)}>{p.label}</button>
        ))}
      </div>
      <div className="pomo-ring">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r={r} fill="none" stroke="var(--border)" strokeWidth="8"/>
          <circle cx="90" cy="90" r={r} fill="none" stroke={PHASES[phaseIdx].color} strokeWidth="8"
            strokeDasharray={circ} strokeDashoffset={circ*(1-progress/100)} style={{transition:'stroke-dashoffset 1s linear'}}
            strokeLinecap="round"/>
        </svg>
        <div className="pomo-time">
          <div className="pomo-num">{mm}:{ss}</div>
          <div className="pomo-phase">{PHASES[phaseIdx].label}</div>
        </div>
      </div>
      <div className="pomo-btns">
        <button className="pomo-btn pomo-btn-sec" onClick={reset} title="Reset"><Icons.RotateCcw/></button>
        <button className="pomo-btn pomo-btn-main" style={{width:56,height:56,fontSize:'1.2rem'}} onClick={()=>setRunning(r=>!r)}>

// NOTES APP

function NoteTaker() {
  const [md, setMd] = useState(()=>localStorage.getItem('notes_md')||`# My Study Notes\n\nStart typing here... **Bold**, *italic*, \`code\`\n\n## Key Concepts\n- Concept 1\n- Concept 2\n\n## Summary\nWrite your summary here.`);
  const [preview, setPreview] = useState(false);
  const [saved, setSaved] = useState(false);

  useEffect(()=>{ localStorage.setItem('notes_md',md); },[md]);

  const save=()=>{ setSaved(true); setTimeout(()=>setSaved(false),2000); };

  const renderMd=(text)=>{
    return text
      .replace(/^### (.+)$/gm,'<h3>$1</h3>')
      .replace(/^## (.+)$/gm,'<h2>$1</h2>')
      .replace(/^# (.+)$/gm,'<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`(.+?)`/g,'<code>$1</code>')
      .replace(/^- (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s,'<ul>$1</ul>')
      .replace(/\n\n/g,'</p><p>')
      .replace(/^(?!<[huli])/gm,'<p>')
      .replace(/(?<![>])$/gm,'</p>');
  };

  const insertMd=(prefix,suffix='')=>{
    const ta=document.getElementById('notes-area');
    if(!ta) return;
    const start=ta.selectionStart, end=ta.selectionEnd;
    const sel=md.slice(start,end)||'text';
    const newMd=md.slice(0,start)+prefix+sel+suffix+md.slice(end);
    setMd(newMd);
  };

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.75rem'}}>
        <div className="tabs" style={{flex:1,maxWidth:220}}>
          <button className={`tab-btn${!preview?' active':''}`} onClick={()=>setPreview(false)}>Edit</button>
          <button className={`tab-btn${preview?' active':''}`} onClick={()=>setPreview(true)}>Preview</button>
        </div>
        <button className="btn-add" onClick={save} style={{marginLeft:'0.75rem'}}>
          {saved?<><Icons.Check/> Saved!</>:<><Icons.FileText/> Save</>}
        </button>
      </div>
      {!preview?(
        <>
          <div className="notes-toolbar">
            {[['B','**','**'],['I','*','*'],['`Code`','`','`'],['# H1','# ',''],['## H2','## ',''],['- List','- ','']].map(([l,p,s])=>(
              <button key={l} className="notes-btn" onClick={()=>insertMd(p,s)}>{l}</button>
            ))}
          </div>
          <textarea id="notes-area" className="notes-area" value={md} onChange={e=>setMd(e.target.value)} spellCheck="false"/>
        </>
      ):(
        <div className="notes-preview" dangerouslySetInnerHTML={{__html:renderMd(md)}}/>
      )}
    </div>
  );
}

function RequestForm() {
  const [form,setForm] = useState({name:'',email:'',course:'',type:'',title:'',desc:'',priority:'medium'});
  const [errors,setErrors] = useState({});
  const [success,setSuccess] = useState(false);
  const [loading,setLoading] = useState(false);

  const validate=()=>{
    const e={};
    if(!form.name.trim()) e.name='Name is required';
    if(!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email='Valid email required';
    if(!form.course.trim()) e.course='Course code is required';
    if(!form.type) e.type='Please select a resource type';
    if(!form.title.trim()) e.title='Resource title is required';
    if(form.desc.length<20) e.desc='Please provide at least 20 characters';
    return e;
  };

  const submit=()=>{
    const e=validate();
    if(Object.keys(e).length){ setErrors(e); return; }
    setLoading(true);
    setTimeout(()=>{ setLoading(false); setSuccess(true); },1400);
  };

  const f=(k)=>({
    value:form[k],
    onChange:e=>{ setForm(p=>({...p,[k]:e.target.value})); setErrors(p=>({...p,[k]:''})); }
  });

  if(success) return (
    <div className="success-overlay">
      <div className="success-card">
        <Confetti/>
        <div className="success-icon">✅</div>
        <h2 style={{fontFamily:'Syne,sans-serif',fontSize:'1.5rem',fontWeight:800,marginBottom:'0.5rem'}}>Request Submitted!</h2>
        <p style={{color:'var(--text2)',marginBottom:'1.5rem',lineHeight:1.6}}>Your resource request has been received. Our team will review and upload it within 48 hours.</p>
        <button className="btn-primary" onClick={()=>{ setSuccess(false); setForm({name:'',email:'',course:'',type:'',title:'',desc:'',priority:'medium'}); }}>
          Submit Another
        </button>
      </div>
    </div>
  );

  return (
    <div style={{maxWidth:640,margin:'0 auto'}}>
      <div className="form-grid">
        <div className="form-group">
          <label className="form-label">Full Name *</label>
          <input className="form-input" placeholder="John Smith" {...f('name')}/>
          {errors.name&&<div className="form-error">{errors.name}</div>}
        </div>
        <div className="form-group">
          <label className="form-label">Email Address *</label>
          <input className="form-input" type="email" placeholder="john@university.edu" {...f('email')}/>
          {errors.email&&<div className="form-error">{errors.email}</div>}
        </div>
      </div>
      <div className="form-grid">
        <div className="form-group">
          <label className="form-label">Course Code *</label>
          <input className="form-input" placeholder="CS301, MATH201..." {...f('course')}/>
          {errors.course&&<div className="form-error">{errors.course}</div>}
        </div>
        <div className="form-group">
          <label className="form-label">Resource Type *</label>
          <select className="form-select" {...f('type')}>
            <option value="">Select type...</option>
            <option value="pdf">PDF / Textbook</option>
            <option value="notes">Lecture Notes</option>
            <option value="journal">Research Paper</option>
            <option value="video">Video Lecture</option>
            <option value="other">Other</option>
          </select>
          {errors.type&&<div className="form-error">{errors.type}</div>}
        </div>
      </div>
      <div className="form-group">
        <label className="form-label">Resource Title *</label>
        <input className="form-input" placeholder="e.g. Introduction to Graph Theory — Chapter 5" {...f('title')}/>
        {errors.title&&<div className="form-error">{errors.title}</div>}
      </div>
      <div className="form-group">
        <label className="form-label">Description / Context *</label>
        <textarea className="form-textarea" placeholder="Describe why this resource is valuable, what topic it covers, and where you found the reference..." {...f('desc')}/>
        {errors.desc&&<div className="form-error">{errors.desc}</div>}
      </div>
      <div className="form-group">
        <label className="form-label">Priority</label>
        <div style={{display:'flex',gap:'0.5rem'}}>
          {['low','medium','high'].map(p=>(
            <button key={p} onClick={()=>setForm(f=>({...f,priority:p}))} style={{
              padding:'0.4rem 1rem',borderRadius:99,fontWeight:600,fontSize:'0.8rem',cursor:'pointer',
              fontFamily:'DM Sans,sans-serif',transition:'all 0.15s',
              background:form.priority===p?p==='high'?'rgba(244,63,94,0.12)':p==='medium'?'rgba(245,158,11,0.12)':'rgba(16,185,129,0.12)':'var(--surface)',
              color:form.priority===p?p==='high'?'var(--rose)':p==='medium'?'var(--amber)':'var(--emerald)':'var(--text2)',
              border:`1px solid ${form.priority===p?p==='high'?'rgba(244,63,94,0.3)':p==='medium'?'rgba(245,158,11,0.3)':'rgba(16,185,129,0.3)':'var(--border)'}`,
            }}>{p.charAt(0).toUpperCase()+p.slice(1)}</button>
          ))}
        </div>
      </div>
      <button className="btn-primary" onClick={submit} disabled={loading} style={{width:'100%',justifyContent:'center',padding:'0.875rem',fontSize:'0.95rem'}}>
        {loading?(
          <span style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
            <span style={{width:16,height:16,border:'2px solid rgba(255,255,255,0.3)',borderTopColor:'white',borderRadius:'50%',display:'inline-block',animation:'spin 0.8s linear infinite'}}/>
            Submitting...
          </span>
        ):(
          <><Icons.Send/> Submit Request</>
        )}
      </button>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}
